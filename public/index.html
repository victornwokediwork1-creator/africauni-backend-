<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfricaUni</title>

<style>
/* ================= GLOBAL ================= */
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(180deg,#0f172a,#0b1220);
  color:#e5e7eb;
}

/* ================= TOP BAR ================= */
header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:14px;
  background: linear-gradient(90deg,#2563eb,#06b6d4,#8b5cf6);
  font-weight:bold;
  z-index:999;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* ================= CONTAINER ================= */
.container{
  padding:80px 15px 80px;
}

/* ================= BUTTONS ================= */
button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  background:#1d4ed8;
}

/* ================= INPUTS ================= */
input{
  width:95%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:#1e293b;
  color:white;
}

/* ================= CARDS ================= */
.card{
  background:#111827;
  padding:12px;
  margin:12px 0;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  border-left:3px solid #2563eb;
}

/* ================= POSTS IMAGE ================= */
.card img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* ================= CHAT ================= */
#msgs{
  height:300px;
  overflow:auto;
  background:#0b1220;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
}

.msg{
  padding:8px;
  margin:6px 0;
  background:#1e293b;
  border-radius:10px;
}

/* ================= VIDEO ================= */
video{
  width:100%;
  max-width:350px;
  border-radius:15px;
  margin-top:10px;
  background:black;
}

/* ================= NAV BAR ================= */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:#0b1220;
  padding:10px;
  border-top:1px solid #1e293b;
}

/* ================= SCREENS ================= */
.hidden{display:none}

/* ================= LOGIN BOX ================= */
.loginBox{
  margin-top:120px;
  text-align:center;
}
</style>
</head>

<body>

<header>🎓 AfricaUni</header>

<!-- WELCOME -->
<div id="welcome" class="container">
  <h2>Welcome to AfricaUni 🌍</h2>
  <p>A modern African campus network</p>
  <button onclick="goLogin()">Continue</button>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Enter your name">
  <button onclick="enter()">Enter App</button>
</div>

<!-- APP -->
<div id="app" class="hidden container">

  <!-- POSTS -->
  <div id="postsSection">
    <h3>📢 Campus Feed</h3>

    <input id="text" placeholder="Share something...">
    <input type="file" id="img">
    <button onclick="post()">Upload</button>

    <div id="posts"></div>
  </div>

  <!-- CHAT -->
  <div id="chatSection" class="hidden">
    <h3>💬 Chat Room</h3>

    <input id="room" placeholder="Room name">
    <button onclick="join()">Join</button>

    <div id="msgs"></div>

    <input id="msg" placeholder="Message">
    <button onclick="send()">Send</button>
  </div>

  <!-- MEET -->
  <div id="meetSection" class="hidden">
    <h3>📡 Meet (Camera)</h3>

    <video id="cam" autoplay playsinline></video>

    <button onclick="startCam()">Start</button>
    <button onclick="stopCam()">Stop</button>

    <p id="status">Idle</p>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('postsSection')">Posts</button>
  <button onclick="show('chatSection')">Chat</button>
  <button onclick="show('meetSection')">Meet</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let user="";
let room="";
let stream;

/* NAV FLOW */
function goLogin(){
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

function enter(){
  user=document.getElementById("user").value;
  if(!user) return alert("Enter name");

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

/* SWITCH */
function show(id){
  document.getElementById("postsSection").classList.add("hidden");
  document.getElementById("chatSection").classList.add("hidden");
  document.getElementById("meetSection").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* ================= POSTS ================= */
async function post(){
  const text=document.getElementById("text").value;
  const img=document.getElementById("img").files[0];

  const form=new FormData();
  form.append("text",text);
  form.append("user",user);
  if(img) form.append("image",img);

  await fetch("/post",{method:"POST",body:form});
  loadPosts();
}

async function loadPosts(){
  const res=await fetch("/posts");
  const data=await res.json();

  document.getElementById("posts").innerHTML=
    data.map(p=>`
      <div class="card">
        <b>${p.user}</b>
        <p>${p.text}</p>
        ${p.image?`<img src="${p.image}">`:""}
      </div>
    `).join("");
}
loadPosts();

/* ================= CHAT ================= */
function join(){
  room=document.getElementById("room").value;
  socket.emit("join",room);
}

socket.on("history",msgs=>{
  document.getElementById("msgs").innerHTML=
    msgs.map(m=>`<div class="msg"><b>${m.user}:</b> ${m.msg}</div>`).join("");
});

socket.on("new",m=>{
  document.getElementById("msgs").innerHTML+=
    `<div class="msg"><b>${m.user}:</b> ${m.msg}</div>`;
});

function send(){
  socket.emit("msg",{room,user,msg:document.getElementById("msg").value});
}

/* ================= CAMERA ================= */
async function startCam(){
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  document.getElementById("cam").srcObject=stream;
  document.getElementById("status").innerText="Camera ON";
}

function stopCam(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  document.getElementById("cam").srcObject=null;
  document.getElementById("status").innerText="Stopped";
}
</script>

</body>
</html>
